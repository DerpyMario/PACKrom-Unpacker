name: Build PACKrom
on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [ x86_64, i686 ]   # builds 64-bit and 32-bit Windows executables

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Compile packrom_unpack for Windows
        run: |
          if [ "${{ matrix.target }}" = "x86_64" ]; then
            x86_64-w64-mingw32-g++ -O2 -std=c++17 -o packrom_unpack-x64.exe packrom_unpack.cpp
            echo "Built packrom_unpack-x64.exe"
          else
            i686-w64-mingw32-g++ -O2 -std=c++17 -o packrom_unpack-x86.exe packrom_unpack.cpp
            echo "Built packrom_unpack-x86.exe"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packrom_unpack-${{ matrix.target }}
          path: |
            packrom_unpack-x64.exe
            packrom_unpack-x86.exe
